spring:
  application:
    name: bank2budget
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  google-sheets:
    # Set via GOOGLE_SHEETS_URL environment variable
    # Example: https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec
    url: ${GOOGLE_SHEETS_URL:}

  categorization:
