spring:
  application:
    name: bank2budget
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  google-sheets:
    # Set via GOOGLE_SHEETS_URL environment variable
    # Example: https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec
    url: ${GOOGLE_SHEETS_URL:}

  categorization:
    ai:
      # Set via OPENAI_API_KEY environment variable; leave empty to disable AI fallback
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
      # Optional: override the base URL to use any OpenAI-compatible provider.
      # Examples:
      #   Ollama:    http://localhost:11434/v1
      #   Mistral:   https://api.mistral.ai/v1
      #   LM Studio: http://localhost:1234/v1
      # base-url: http://localhost:11434/v1

    # Keyword-to-category rules. Case-insensitive, matched against details + counterparty + remittance.
    # First match wins — order matters! More specific rules should come before generic ones.
    # Category names match the budget categories in categories.txt exactly.
